name: Run AI Agents

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with PAT
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agents/package-lock.json

      - name: Install agent dependencies
        run: cd agents && npm ci

      - name: Run Stats Agent
        run: cd agents && node stats-agent.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
          GITHUB_OWNER: techverdictpro
          GITHUB_REPO: aipickspro-

      - name: Run Writing Agent
        run: cd agents && node writing-agent.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run Publisher Agent
        run: cd agents && node publisher-agent.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
          GITHUB_OWNER: techverdictpro
          GITHUB_REPO: aipickspro-

      - name: Commit and push new articles
        run: |
          git config user.email "agents@aipickspro.com"
          git config user.name "AiPicksPro Agent"
          git pull origin main
          git add content/
          git diff --staged --quiet || git commit -m "Auto: publish new predictions $(date +%Y-%m-%d)"
          git push origin main
